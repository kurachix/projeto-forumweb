<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link rel="stylesheet" href="/static/css/style.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórum WEB</title>

</head>

<body>
    

    <h1 class="titulo-principal">Seja bem-vindo a central de criação de POSTAGENS!!!</h1>
    <h2 class="subtitulo-principal">Preencha os campos abaixo para criar uma nova postagem:</h2>


    <form action="/create" method="post">
        <input name="id" placeholder="Digite aqui o id"> <br>
        <input name="titulo" placeholder="Digite aqui o título"> <br>
        <input name="resumo" placeholder="Resumo"> <br>
        <input name="conteudo" placeholder="Digite aqui o conteudo"> <br>
        <input name="autor" placeholder="Digite aqui o autor">  <br>
        <button type="submit"> Enviar dados! </button>
    </form>

    <main>
        <section class="posts">
            {% if posts %}
                {% for post in posts %}
                <article class="post">
                    {% for chave, valor in post.items() %}
                        <p><strong>{{ chave }}:</strong> {{ valor }}</p>
                    {% endfor %}
                </article>
                {% endfor %}
            {% else %}
                <article class="post">
                    <p>Nenhum post encontrado.</p>
                </article>
            {% endif %}
        </section>
    </main>

</body>

</html>
