<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link rel="stylesheet" href="/static/css/style.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórum WEB</title>

</head>

<body>

    <header>
        <h1 class="titulo-principal">Fórum WEB</h1>
        <h2 class="subtitulo-principal">Fique a vontade para fazer publicações!!!</h2>
    </header>



    <a href="/create" class="adicionar-post">Adicione a sua POSTAGEM!</a>

    <a href="/edit" class="editar-post">Edite a sua POSTAGEM!</a>


    <a href="/del" class="deletar-post">Delete a sua POSTAGEM!</a>


    <main>
        <section class="posts">
            {% for post in posts %}
            <article class="post">
                {% for chave, valor in post.items() %}
                    <p><strong>{{ chave }}:</strong> {{ valor }}</p>
                {% endfor %}
            </article>
            {% endfor %}
        </section>
    </main>


</body>

<script src="/static/js/script.js"></script>


</html>
